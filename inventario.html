<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP - Inventario</title>
  <link rel="stylesheet" href="static/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div class="app-root">
    <section id="erp-app" class="erp-app">

      <!-- SIDEBAR -->
      <aside class="sidebar collapsed" id="mainSidebar">
        <div class="sidebar-header">
          <button class="btn-hamburger" id="btnHamburger" title="Toggle menú">
            <i class="fas fa-bars"></i>
          </button>
        </div>

        <nav class="sidebar-nav">
          <a id="navSeccionVenta" class="nav-item" href="venta.html" title="Punto de Venta">
            <i class="fas fa-cash-register"></i>
            <span class="nav-item-label">Punto de Venta</span>
          </a>
          <a id="navSeccionCaja" class="nav-item" href="caja.html" title="Caja">
            <i class="fas fa-wallet"></i>
            <span class="nav-item-label">Caja</span>
          </a>
          <a id="navSeccionInventario" class="nav-item active" href="inventario.html" title="Inventario">
            <i class="fas fa-boxes-stacked"></i>
            <span class="nav-item-label">Inventario</span>
          </a>
          <a id="navSeccionCatalogo" class="nav-item" href="catalogo/catalogoProducto.html" title="Catálogo">
            <i class="fas fa-tag"></i>
            <span class="nav-item-label">Catálogo</span>
          </a>
          <a id="navSeccionUsuario" class="nav-item" href="usuario.html" title="Usuarios">
            <i class="fas fa-users"></i>
            <span class="nav-item-label">Usuarios</span>
          </a>
          <a id="navSeccionConfiguracion" class="nav-item" href="dashboard.html" title="Dashboard">
            <i class="fas fa-chart-bar"></i>
            <span class="nav-item-label">Dashboard</span>
          </a>
        </nav>

      </aside>

      <div class="main-content">
        <div class="page-brand">
          <div class="brand-icon" aria-hidden="true"><i class="fas fa-utensils"></i></div>
          <div class="page-brand-text">
            <h2>Lo Esencial</h2>
            <p>ERP Broasteria</p>
          </div>
          <!-- USER -->
          <div class="topbar-user" id="topbarUser">
              <button class="topbar-user-btn" id="topbarUserBtn">
                <div class="topbar-user-avatar" id="topbarAvatar">A</div>
                <div class="topbar-user-info">
                  <span class="topbar-user-name" id="topbarNombre">Usuario</span>
                  <span class="topbar-user-role" id="topbarRol">Rol</span>
                </div>
                <i class="fas fa-chevron-down topbar-user-chevron"></i>
              </button>
              <div class="topbar-user-dropdown" id="topbarDropdown">
                <div class="topbar-dropdown-divider"></div>
                <button class="topbar-dropdown-item danger" id="btnCerrarSesion">
                  <i class="fas fa-right-from-bracket"></i>
                  Cerrar Sesión
                </button>
              </div>
          </div>
        </div>
        <!-- TOPBAR -->
        <header class="topbar">
          <h2>Inventario</h2>
          <div class="topbar-right">
            <p id="today-date"></p>
          </div>
        </header>

        <main class="content-area">
          <section class="module active">
            <div class="module-header">
              <div class="tab-row">
                <button class="tab active" data-tab="inv-stock">Stock Actual</button>
                <button class="tab" data-tab="inv-actualizar">Actualizar Stock</button>
              </div>
            </div>

            <div class="tab-content active" id="inv-stock">
              <div class="card">
                <div class="filter-bar">
                  <label for="invFiltroOrden"><i class="fas fa-arrow-down-a-z" style="margin-right:4px;"></i>Ordenar por</label>
                  <select id="invFiltroOrden" class="filter-select">
                    <option value="az">Nombre A → Z</option>
                    <option value="za">Nombre Z → A</option>
                    <option value="categoria">Categoría</option>
                    <option value="stock-desc">Stock: Mayor → Menor</option>
                    <option value="stock-asc">Stock: Menor → Mayor</option>
                  </select>
                  <div class="filter-bar-separator"></div>
                  <label for="invFiltroCategoria"><i class="fas fa-layer-group" style="margin-right:4px;"></i>Categoría</label>
                  <select id="invFiltroCategoria" class="filter-select">
                    <option value="">Todas</option>
                  </select>
                </div>
                <div class="table-container">
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th>Producto</th>
                        <th>Stock</th>
                      </tr>
                    </thead>
                    <tbody id="tbody-stock-actual"></tbody>
                  </table>
                </div>
                <div id="stock-actual-empty" class="empty-state hidden">
                  <i class="fas fa-boxes-stacked fa-2x" style="color:var(--zinc-400);"></i>
                  <p>No hay productos en el inventario</p>
                </div>
              </div>
            </div>

            <div class="tab-content" id="inv-actualizar">
              <div class="card">
                <form id="form-actualizar-stock">
                  <div class="filter-bar">
                    <label for="invActualizarFiltroOrden"><i class="fas fa-arrow-down-a-z" style="margin-right:4px;"></i>Ordenar por</label>
                    <select id="invActualizarFiltroOrden" class="filter-select">
                      <option value="az">Nombre A → Z</option>
                      <option value="za">Nombre Z → A</option>
                      <option value="categoria">Categoría</option>
                      <option value="stock-desc">Stock: Mayor → Menor</option>
                      <option value="stock-asc">Stock: Menor → Mayor</option>
                    </select>
                    <div class="filter-bar-separator"></div>
                    <label for="invActualizarFiltroCategoria"><i class="fas fa-layer-group" style="margin-right:4px;"></i>Categoría</label>
                    <select id="invActualizarFiltroCategoria" class="filter-select">
                      <option value="">Todas</option>
                    </select>
                  </div>
                  <div class="table-container">
                    <table class="data-table stock-editor-table">
                      <thead>
                        <tr>
                          <th>Producto</th>
                          <th>Stock actual</th>
                          <th>Nuevo stock</th>
                        </tr>
                      </thead>
                      <tbody id="tbody-actualizar-stock"></tbody>
                    </table>
                  </div>
                  <div id="actualizar-stock-empty" class="empty-state hidden">
                    <i class="fas fa-boxes-stacked fa-2x" style="color:var(--zinc-400);"></i>
                    <p>No hay productos para actualizar</p>
                  </div>
                  <div class="form-actions form-actions-end" id="actualizar-stock-actions">
                    <button type="button" class="btn btn-muted" id="btn-cancelar-actualizacion">Cancelar</button>
                    <button class="btn btn-primary" type="submit" id="btn-guardar-stock">Guardar cambios</button>
                  </div>
                </form>
              </div>
            </div>
          </section>
        </main>
      </div>
    </section>
  </div>

  <div id="modal-confirmar-stock" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-icon" aria-hidden="true"><i class="fas fa-boxes-stacked" style="font-size:24px;"></i></div>
      <h3>Confirmar Actualización</h3>
      <p class="muted">Revisa los cambios antes de guardar:</p>
      <div id="lista-cambios-stock" class="modal-inventario"></div>
      <div class="form-actions">
        <button id="btnConfirmarCambiosStock" class="btn btn-primary" type="button">Sí, actualizar</button>
        <button id="btnCancelarCambiosStock" class="btn btn-muted" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toastFixed"></div>

  <script src="static/js/app.js"></script>
  <script src="static/js/APIS_Inventario.js"></script>
  <script src="static/js/sidebar.js"></script>

</body>
</html>

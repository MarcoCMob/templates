<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP - Catálogo</title>
  <link rel="stylesheet" href="../static/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div class="app-root">
    <section id="erp-app" class="erp-app">

      <!-- SIDEBAR -->
      <aside class="sidebar collapsed" id="mainSidebar">
        <div class="sidebar-header">
          <button class="btn-hamburger" id="btnHamburger" title="Toggle menú">
            <i class="fas fa-bars"></i>
          </button>
        </div>

        <nav class="sidebar-nav">
          <a id="navSeccionVenta" class="nav-item" href="../venta.html" title="Punto de Venta">
            <i class="fas fa-cash-register"></i>
            <span class="nav-item-label">Punto de Venta</span>
          </a>
          <a id="navSeccionCaja" class="nav-item" href="../caja.html" title="Caja">
            <i class="fas fa-wallet"></i>
            <span class="nav-item-label">Caja</span>
          </a>
          <a id="navSeccionInventario" class="nav-item" href="../inventario.html" title="Inventario">
            <i class="fas fa-boxes-stacked"></i>
            <span class="nav-item-label">Inventario</span>
          </a>
          <a id="navSeccionCatalogo" class="nav-item active" href="catalogoProducto.html" title="Catálogo">
            <i class="fas fa-tag"></i>
            <span class="nav-item-label">Catálogo</span>
          </a>
          <a id="navSeccionUsuario" class="nav-item" href="../usuario.html" title="Usuarios">
            <i class="fas fa-users"></i>
            <span class="nav-item-label">Usuarios</span>
          </a>
          <a id="navSeccionConfiguracion" class="nav-item" href="../dashboard.html" title="Dashboard">
            <i class="fas fa-chart-bar"></i>
            <span class="nav-item-label">Dashboard</span>
          </a>
        </nav>

      </aside>

      <div class="main-content">
        <div class="page-brand">
          <div class="brand-icon" aria-hidden="true"><i class="fas fa-utensils"></i></div>
          <div class="page-brand-text">
            <h2>Lo Esencial</h2>
            <p>ERP Broasteria</p>
          </div>
          <!-- USER -->
          <div class="topbar-user" id="topbarUser">
              <button class="topbar-user-btn" id="topbarUserBtn">
                <div class="topbar-user-avatar" id="topbarAvatar">A</div>
                <div class="topbar-user-info">
                  <span class="topbar-user-name" id="topbarNombre">Usuario</span>
                  <span class="topbar-user-role" id="topbarRol">Rol</span>
                </div>
                <i class="fas fa-chevron-down topbar-user-chevron"></i>
              </button>
              <div class="topbar-user-dropdown" id="topbarDropdown">
                <div class="topbar-dropdown-divider"></div>
                <button class="topbar-dropdown-item danger" id="btnCerrarSesion">
                  <i class="fas fa-right-from-bracket"></i>
                  Cerrar Sesión
                </button>
              </div>
          </div>
        </div>
        <!-- TOPBAR -->
        <header class="topbar">
          <h2>Catálogo</h2>
          <div class="topbar-right">
            <p id="today-date"></p>
          </div>
        </header>

        <main class="content-area">
          <section id="module-catalogo" class="module active">
            <div class="module-header">
              <div class="tab-row">
                <a class="tab" data-tab="cat-productos" href="catalogoProducto.html">
                  <i class="fas fa-tag" style="margin-right:6px;"></i>Productos
                </a>
                <a class="tab active" data-tab="cat-categorias" href="catalogoCategoria.html">
                  <i class="fas fa-layer-group" style="margin-right:6px;"></i>Categorías
                </a>
              </div>
              <div class="catalog-actions">
                <button class="btn btn-primary catalog-action" type="button" data-action="open-form" data-target="cat-categorias">
                  <i class="fas fa-plus"></i>
                  Nueva categoría
                </button>
              </div>
            </div>
            <div class="tab-content active" id="cat-categorias">
              <div class="card">
                <div class="filter-bar">
                  <label for="filtroOrdenCategoria"><i class="fas fa-arrow-down-a-z" style="margin-right:4px;"></i>Ordenar por</label>
                  <select id="filtroOrdenCategoria" class="filter-select">
                    <option value="az">Nombre A → Z</option>
                    <option value="za">Nombre Z → A</option>
                  </select>
                </div>
                <div class="table-container">
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th>Categoría</th>
                        <th>Productos</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody id="tbodyCategoria"></tbody>
                  </table>
                </div>
                <form class="inline-form hidden" id="form-cat-categorias">
                  <div class="form-grid">
                    <label class="field">
                      <span>Categoría</span>
                      <input id="txtNombreCategoria" type="text" placeholder="Ej. Combos" />
                    </label>
                  </div>
                  <div class="form-actions">
                    <button id="btnGuardarCategoria" class="btn btn-primary" type="submit">Guardar</button>
                    <button class="btn btn-muted" type="button" data-action="cancel-form">Cancelar</button>
                  </div>
                </form>
              </div>
            </div>
          </section>
        </main>
      </div>
    </section>
  </div>

  <div id="modalConfirmar" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>¿Confirmar eliminación?</h3>
      </div>
      <div class="modal-body">
        <p>¿Estás seguro de que deseas eliminar esta categoría? Esta acción no se puede deshacer.</p>
      </div>
      <div class="modal-footer">
        <button id="btnCancelarModal" class="btn btn-muted" type="button">Cancelar</button>
        <button id="btnAceptarModal" class="btn btn-danger" type="button">Eliminar</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toastFixed"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../static/js/APIs_Categoria.js"></script>
  <script src="../static/js/app.js"></script>
  <script src="../static/js/sidebar.js"></script>

</body>
</html>

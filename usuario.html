<!DOCTYPE html>

<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP - Usuarios</title>
  <link rel="stylesheet" href="static/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div class="app-root">
    <section id="erp-app" class="erp-app">

      <!-- SIDEBAR -->
      <aside class="sidebar collapsed" id="mainSidebar">
        <div class="sidebar-header">
          <button class="btn-hamburger" id="btnHamburger" title="Toggle menú">
            <i class="fas fa-bars"></i>
          </button>
        </div>

        <nav class="sidebar-nav">
          <a id="navSeccionVenta" class="nav-item" href="venta.html" title="Punto de Venta">
            <i class="fas fa-cash-register"></i>
            <span class="nav-item-label">Punto de Venta</span>
          </a>
          <a id="navSeccionCaja" class="nav-item" href="caja.html" title="Caja">
            <i class="fas fa-wallet"></i>
            <span class="nav-item-label">Caja</span>
          </a>
          <a id="navSeccionInventario" class="nav-item" href="inventario.html" title="Inventario">
            <i class="fas fa-boxes-stacked"></i>
            <span class="nav-item-label">Inventario</span>
          </a>
          <a id="navSeccionCatalogo" class="nav-item" href="catalogo/catalogoProducto.html" title="Catálogo">
            <i class="fas fa-tag"></i>
            <span class="nav-item-label">Catálogo</span>
          </a>
          <a id="navSeccionUsuario" class="nav-item active" href="usuario.html" title="Usuarios">
            <i class="fas fa-users"></i>
            <span class="nav-item-label">Usuarios</span>
          </a>
          <a id="navSeccionConfiguracion" class="nav-item" href="dashboard.html" title="Dashboard">
            <i class="fas fa-chart-bar"></i>
            <span class="nav-item-label">Dashboard</span>
          </a>
        </nav>

      </aside>

      <div class="main-content">
        <div class="page-brand">
          <div class="brand-icon" aria-hidden="true"><i class="fas fa-utensils"></i></div>
          <div class="page-brand-text">
            <h2>Lo Esencial</h2>
            <p>ERP Broasteria</p>
          </div>
          <!-- USER -->
          <div class="topbar-user" id="topbarUser">
              <button class="topbar-user-btn" id="topbarUserBtn">
                <div class="topbar-user-avatar" id="topbarAvatar">A</div>
                <div class="topbar-user-info">
                  <span class="topbar-user-name" id="topbarNombre">Usuario</span>
                  <span class="topbar-user-role" id="topbarRol">Rol</span>
                </div>
                <i class="fas fa-chevron-down topbar-user-chevron"></i>
              </button>
              <div class="topbar-user-dropdown" id="topbarDropdown">
                <div class="topbar-dropdown-divider"></div>
                <button class="topbar-dropdown-item danger" id="btnCerrarSesion">
                  <i class="fas fa-right-from-bracket"></i>
                  Cerrar Sesión
                </button>
              </div>
          </div>
        </div>
        <!-- TOPBAR -->
        <header class="topbar">
          <h2>Usuarios</h2>
          <div class="topbar-right">
            <p id="today-date"></p>
          </div>
        </header>

        <main class="content-area">
          <section id="module-usuarios" class="module active">
            <div id="formUsuario" class="card">
              <h3>Nuevo usuario</h3>
              <form class="inline-form">
                <div class="form-grid">
                  <label class="field">
                    <span>Nombre Completo</span>
                    <input id="txtNombreCompleto" type="text" placeholder="Ej. María López" required />
                  </label>
                  <label class="field">
                    <span>Usuario (login)</span>
                    <input id="txtUsuario" type="text" placeholder="Ej. mlopez" required />
                  </label>
                  <label class="field">
                    <span>Contraseña</span>
                    <input id="txtContrasena" type="password" placeholder="********" required />
                  </label>
                  <label class="field">
                    <span>Rol</span>
                    <select id="comboRol" required>
                      <option value="" disabled selected>Seleccione un rol</option>
                      <option value="MESERO">Mesero</option>
                      <option value="CAJERO">Cajero</option>
                    </select>
                  </label>
                </div>
                <div class="form-actions">
                  <button id="btnGuardarUsuario" class="btn btn-primary" type="button">
                    <i class="fas fa-floppy-disk" style="margin-right:6px;"></i>Guardar
                  </button>
                </div>
              </form>
            </div>

            <div class="card">
              <h3>Gestión de Usuarios</h3>
              <div class="table-container">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>Nombre Completo</th>
                      <th>Usuario</th>
                      <th>Rol</th>
                    </tr>
                  </thead>
                  <tbody id="tbodyUsuario"></tbody>
                </table>
              </div>
            </div>
          </section>
        </main>
      </div>
    </section>
  </div>

  <div id="toast-container" class="toastFixed"></div>

  <script src="static/js/app.js"></script>
  <script src="static/js/APIs_Usuario.js"></script>
  <script src="static/js/sidebar.js"></script>

</body>
</html>
